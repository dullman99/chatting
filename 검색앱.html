<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유튜브 컨텐츠 검색</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f0f; color: #e5e5e5; font-family: -apple-system, sans-serif; min-height: 100vh; }
  .topbar { background: #1a1a1a; padding: 14px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #2a2a2a; }
  .logo { font-size: 15px; font-weight: 600; color: #fff; white-space: nowrap; }
  .search-wrap { flex: 1; position: relative; }
  .search-wrap input { width: 100%; background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 24px; padding: 9px 18px 9px 40px; font-size: 15px; color: #fff; outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: #7F77DD; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #888; font-size: 15px; pointer-events: none; }
  .refresh-btn { background: #7F77DD; color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .refresh-btn:hover { background: #6a62c4; }
  .count-bar { padding: 12px 20px 4px; font-size: 13px; color: #888; }
  .count-bar span { color: #9b8ff0; font-weight: 600; }
  .filter-bar { padding: 6px 20px 10px; display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-chip { background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 16px; padding: 4px 12px; font-size: 12px; color: #aaa; cursor: pointer; transition: all 0.15s; }
  .filter-chip.active { background: #7F77DD; border-color: #7F77DD; color: #fff; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; padding: 0 20px 30px; }
  .card { background: #1e1e1e; border-radius: 10px; border: 1px solid #2a2a2a; overflow: hidden; cursor: pointer; transition: transform 0.15s, border-color 0.15s; }
  .card:hover { transform: translateY(-2px); border-color: #7F77DD; }
  .thumb { width: 100%; aspect-ratio: 16/9; background: #2a2a2a; overflow: hidden; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .thumb-fallback { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #252525; color: #555; font-size: 28px; }
  .card-body { padding: 10px 12px 12px; }
  .card-meta-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .card-channel { font-size: 11px; color: #9b8ff0; font-weight: 500; }
  .card-date { font-size: 11px; color: #666; }
  .card-title { font-size: 13px; font-weight: 500; color: #e5e5e5; line-height: 1.45; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
  .tag { background: #2a2a2a; color: #888; font-size: 10px; padding: 2px 7px; border-radius: 10px; }
  .badge-monetize { display: inline-block; background: #7F77DD22; color: #9b8ff0; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px; }
  .card-bottom { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .card-type { font-size: 11px; color: #555; }
  .empty { text-align: center; padding: 60px 20px; color: #555; font-size: 15px; }
  .loading { text-align: center; padding: 60px 20px; color: #666; font-size: 14px; }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 12px 20px; }
    .card-title { font-size: 12px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">📺 컨텐츠 검색</span>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="키워드, 채널명, 태그 입력..." />
  </div>
  <button class="refresh-btn" onclick="loadData()">↺ 새로고침</button>
</div>

<div class="count-bar" id="countBar">데이터 불러오는 중...</div>
<div class="filter-bar" id="filterBar"></div>
<div class="grid" id="grid">
  <div class="loading">⏳ 구글 스프레드시트에서 데이터 불러오는 중...</div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzVUesIOCzRjschSpYLBOlKX-nhHSVPtjAEIRXNuWyrL5qcLVVMG5iEEqOGAN384iY2/exec';

let allData = [];
let activeType = '';

async function loadData() {
  document.getElementById('grid').innerHTML = '<div class="loading">⏳ 데이터 불러오는 중...</div>';
  document.getElementById('countBar').textContent = '불러오는 중...';
  try {
    const res = await fetch(SCRIPT_URL + '?q=');
    const json = await res.json();
    allData = json.items || [];
    buildFilters();
    renderCards(allData);
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="empty">❌ 데이터를 불러오지 못했습니다.<br>SCRIPT_URL을 확인해 주세요.</div>';
  }
}

function buildFilters() {
  const types = [...new Set(allData.map(d => d.type).filter(Boolean))];
  const bar = document.getElementById('filterBar');
  bar.innerHTML = '<span class="filter-chip active" onclick="setType(\'\', this)">전체</span>';
  types.forEach(t => {
    bar.innerHTML += `<span class="filter-chip" onclick="setType('${t}', this)">${t}</span>`;
  });
}

function setType(type, el) {
  activeType = type;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = allData;
  if (activeType) filtered = filtered.filter(d => d.type === activeType);
  if (q) {
    filtered = filtered.filter(d =>
      [d.title, d.channel, d.keyword, d.type, d.summary, ...(d.tags || [])]
        .join(' ').toLowerCase().includes(q)
    );
  }
  renderCards(filtered);
}

function renderCards(items) {
  const grid = document.getElementById('grid');
  const countBar = document.getElementById('countBar');
  countBar.innerHTML = `<span>${items.length.toLocaleString()}개</span> 결과 · 전체 ${allData.length.toLocaleString()}개`;

  if (!items.length) {
    grid.innerHTML = '<div class="empty">🔍 검색 결과가 없습니다.</div>';
    return;
  }

  grid.innerHTML = items.map(item => {
    const thumb = item.thumbnail
      ? `<img src="${item.thumbnail}" onerror="this.parentNode.innerHTML='<div class=thumb-fallback>▶</div>'" loading="lazy" />`
      : '<div class="thumb-fallback">▶</div>';
    const tags = (item.tags || []).slice(0, 3).map(t => `<span class="tag">#${t}</span>`).join('');
    const monetize = item.monetize ? `<span class="badge-monetize">#수익화</span>` : '';
    const dateStr = item.date ? String(item.date).substring(0, 10) : '';

    return `
      <div class="card" onclick="window.open('${item.link}', '_blank')">
        <div class="thumb">${thumb}</div>
        <div class="card-body">
          <div class="card-meta-top">
            <span class="card-channel">${item.channel || ''}</span>
            <span class="card-date">${dateStr}</span>
          </div>
          <div class="card-title">${item.title || '제목 없음'}</div>
          <div class="tags">${tags}</div>
          <div class="card-bottom">
            <span class="card-type">${item.type || ''}</span>
            ${monetize}
          </div>
        </div>
      </div>`;
  }).join('');
}

document.getElementById('searchInput').addEventListener('input', applyFilter);
loadData();
</script>
</body>
</html>
