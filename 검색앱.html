  .filter-bar { padding: 6px 20px 10px; display: flex; gap: 8px; flex-wrap: wrap; }

function isMonetize(item) {
  const text = ((item.title || '') + ' ' + (item.tags || []).join(' ')).toLowerCase();
  return MONETIZE_KEYWORDS.some(kw => text.includes(kw.toLowerCase()));
}

function classifyContent(item) {
  const channel = (item.channel || '').trim();
  const title = (item.title || '').toLowerCase();
  const tags = (item.tags || []).join(' ').toLowerCase();
  const text = title + ' ' + tags;

  // 1단계: 채널명 기반 (최우선)
  for (const [cat, channels] of Object.entries(CHANNEL_CATEGORY)) {
    for (const ch of channels) {
      if (channel === ch || channel.includes(ch) || ch.includes(channel)) {
        return cat;
      }
    }
  }

  // 1.5단계: AI 채널명 직접 지정
  for (const ch of AI_CHANNELS) {
    if (channel === ch || channel.includes(ch) || ch.includes(channel)) {
      return 'AI';
    }
  }

  // 2단계: 심리상담 키워드
  for (const kw of PSYCH_KEYWORDS) {
    if (text.includes(kw.toLowerCase())) return '심리상담';
  }

  // 3단계: 교육 키워드
  for (const kw of EDU_KEYWORDS) {
    if (text.includes(kw.toLowerCase())) return '교육';
  }

  // 4단계: AI 키워드
  for (const kw of AI_KEYWORDS) {
    if (text.includes(kw.toLowerCase())) return 'AI';
  }

  // 5단계: 기타
  return '기타';
}

async function loadData() {
  document.getElementById('grid').innerHTML = '<div class="loading">⏳ 데이터 불러오는 중...</div>';
  document.getElementById('countBar').textContent = '불러오는 중...';
  try {
    const res = await fetch(SCRIPT_URL + '?q=');
    const json = await res.json();
    allData = (json.items || []).map(item => ({
      ...item,
      category: classifyContent(item),
      monetize: isMonetize(item)
    }));
    buildFilters();
    renderCards(allData);
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="empty">❌ 데이터를 불러오지 못했습니다.<br>잠시 후 다시 시도해주세요.</div>';
  }
}

function buildFilters() {
  const categories = ['심리상담', '교육', 'AI', '기타'];
  const bar = document.getElementById('filterBar');
  const counts = {};
  categories.forEach(c => counts[c] = 0);
  allData.forEach(d => { if (counts[d.category] !== undefined) counts[d.category]++; });

  bar.innerHTML = `<span class="filter-chip active" onclick="setCategory('', this)">전체 (${allData.length})</span>`;
  categories.forEach(cat => {
    bar.innerHTML += `<span class="filter-chip cat-${cat}" onclick="setCategory('${cat}', this)">${cat} (${counts[cat]})</span>`;
  });
}

function setMonetize(el) {
  activeMonetize = !activeMonetize;
  activeCategory = '';
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  if (activeMonetize) el.classList.add('active');
  else document.querySelector('.filter-chip').classList.add('active');
  applyFilter();
}

function setCategory(cat, el) {
  activeMonetize = false;
  activeCategory = cat;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = allData;
  if (activeMonetize) filtered = filtered.filter(d => d.monetize);
  if (activeCategory) filtered = filtered.filter(d => d.category === activeCategory);
  if (q) {
    filtered = filtered.filter(d =>
      [d.title, d.channel, d.keyword, d.summary, ...(d.tags || [])]
        .join(' ').toLowerCase().includes(q)
    );
  }
  renderCards(filtered);
}

function renderCards(items) {
  const grid = document.getElementById('grid');
  const countBar = document.getElementById('countBar');
  countBar.innerHTML = `<span>${items.length.toLocaleString()}개</span> 결과 · 전체 ${allData.length.toLocaleString()}개`;

  if (!items.length) {
    grid.innerHTML = '<div class="empty">🔍 검색 결과가 없습니다.</div>';
    return;
  }

  grid.innerHTML = items.map(item => {
    const thumb = item.thumbnail
      ? `<img src="${item.thumbnail}" onerror="this.parentNode.innerHTML='<div class=thumb-fallback>▶</div>'" loading="lazy" />`
      : '<div class="thumb-fallback">▶</div>';
    const tags = (item.tags || []).slice(0, 3).map(t => `<span class="tag">#${t}</span>`).join('');
    const dateStr = item.date ? String(item.date).substring(0, 10) : '';
    const cat = item.category || '기타';

    return `
      <div class="card" onclick="window.open('${item.link}', '_blank')">
        <div class="thumb">${thumb}</div>
        <div class="card-body">
          <div class="card-meta-top">
            <span class="card-channel">${item.channel || ''}</span>
            <span class="card-date">${dateStr}</span>
          </div>
          <div class="card-title">${item.title || '제목 없음'}</div>
          <div class="tags">${tags}</div>
          <div class="card-bottom">
            <span class="badge-category badge-${cat}">${cat}</span>
            ${item.monetize ? '<span class="badge-수익화">💰 수익화</span>' : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

document.getElementById('searchInput').addEventListener('input', applyFilter);
loadData();
</script>
</body>
</html>
