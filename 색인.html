<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 컨텐츠 사전</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #5b6af0;
    --accent2: #8b5cf6;
    --text: #e8e8f0;
    --text-muted: #8888aa;
    --tag-bg: #1e2040;
    --tag-hover: #2a2d5e;
    --highlight: #ffd700;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', 'Noto Sans KR', -apple-system, sans-serif;
    min-height: 100vh;
  }

  /* 헤더 */
  header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    padding: 32px 24px 24px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 28px;
    font-weight: 800;
    background: linear-gradient(90deg, #5b6af0, #8b5cf6, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  header p {
    color: var(--text-muted);
    font-size: 14px;
  }
  #total-count {
    display: inline-block;
    margin-top: 8px;
    background: var(--accent);
    color: white;
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 20px;
    font-weight: 600;
  }

  /* 검색바 */
  .search-bar {
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .search-bar input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .back-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
    display: none;
  }
  .back-btn:hover { color: var(--text); border-color: var(--accent); }

  /* 색인 바 */
  .index-bar {
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .index-letter {
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    background: var(--tag-bg);
    color: var(--text-muted);
    border: 1px solid var(--border);
    transition: all 0.15s;
    user-select: none;
  }
  .index-letter:hover { background: var(--tag-hover); color: var(--text); border-color: var(--accent); }
  .index-letter.active { background: var(--accent); color: white; border-color: var(--accent); }
  .index-letter.empty { opacity: 0.3; cursor: default; }
  .index-letter.empty:hover { background: var(--tag-bg); color: var(--text-muted); border-color: var(--border); }

  /* 메인 콘텐츠 */
  main { padding: 24px; }

  /* 색인 뷰 */
  #index-view {}
  .letter-section { margin-bottom: 40px; }
  .letter-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .letter-badge {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 900;
    color: white;
    flex-shrink: 0;
  }
  .letter-title { font-size: 20px; font-weight: 700; }
  .letter-count { font-size: 13px; color: var(--text-muted); }

  .keyword-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .keyword-chip {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .keyword-chip:hover {
    background: var(--tag-hover);
    border-color: var(--accent);
    transform: translateY(-1px);
  }
  .keyword-chip .chip-count {
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
  }

  /* 결과 뷰 */
  #result-view { display: none; }
  .result-header {
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .result-keyword {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .result-keyword span {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .result-meta { color: var(--text-muted); font-size: 14px; }

  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .video-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .video-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(91, 106, 240, 0.15);
  }
  .video-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    background: var(--surface2);
  }
  .video-thumb-placeholder {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }
  .video-info { padding: 12px; }
  .video-title {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .video-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .video-channel {
    font-size: 11px;
    color: var(--text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .video-date {
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
    margin-left: 8px;
  }
  .video-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }
  .video-tag {
    background: var(--tag-bg);
    color: var(--text-muted);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
  }

  /* 로딩 */
  #loading {
    text-align: center;
    padding: 60px;
    color: var(--text-muted);
    font-size: 16px;
  }
  .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 빈 결과 */
  .empty-state {
    text-align: center;
    padding: 60px;
    color: var(--text-muted);
  }
  .empty-state .emoji { font-size: 48px; margin-bottom: 16px; }

  /* 검색 결과 뷰 */
  #search-view { display: none; }

  @media (max-width: 600px) {
    header { padding: 20px 16px 16px; }
    .search-bar, .index-bar, main { padding-left: 16px; padding-right: 16px; }
    .video-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .letter-badge { width: 36px; height: 36px; font-size: 16px; }
  }
</style>
</head>
<body>

<header>
  <h1>📚 컨텐츠 사전</h1>
  <p>저장된 유튜브 컨텐츠를 키워드로 검색하세요</p>
  <span id="total-count">로딩 중...</span>
</header>

<div class="search-bar">
  <input type="text" id="search-input" placeholder="키워드 검색... (예: 클로드, 옵시디언, 심리학)" />
  <button class="back-btn" id="back-btn" onclick="showIndexView()">← 색인으로</button>
</div>

<div class="index-bar" id="index-bar">
  <!-- JS로 생성 -->
</div>

<main>
  <div id="loading">
    <div class="spinner"></div>
    <div>데이터 불러오는 중...</div>
  </div>
  <div id="index-view" style="display:none;"></div>
  <div id="result-view" style="display:none;"></div>
  <div id="search-view" style="display:none;"></div>
</main>

<script>
const SHEET_ID = '1QAcSEyW5GE5CTrTO-K3V-kNG09Gg2j4_kt84ANzNGaE';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

let allData = [];
let keywordMap = {}; // keyword -> [videos]
let letterMap = {}; // letter -> [keywords]

// 한글 초성 추출
function getChosung(char) {
  const code = char.charCodeAt(0) - 0xAC00;
  if (code < 0 || code > 11171) return null;
  const chosung = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ',
                   'ㄲ','ㄸ','ㅃ','ㅆ','ㅉ'];
  return chosung[Math.floor(code / 588)];
}

// 첫 글자 분류
function getFirstLetter(word) {
  if (!word || !word.trim()) return null;
  const ch = word.trim()[0];
  const code = ch.charCodeAt(0);
  
  // 한글 자모
  if (code >= 0xAC00 && code <= 0xD7A3) {
    const cs = getChosung(ch);
    // 쌍자음 처리
    const map = {'ㄲ':'ㄱ','ㄸ':'ㄷ','ㅃ':'ㅂ','ㅆ':'ㅅ','ㅉ':'ㅈ'};
    return map[cs] || cs;
  }
  if (code >= 0x3131 && code <= 0x314E) {
    const map = {'ㄲ':'ㄱ','ㄸ':'ㄷ','ㅃ':'ㅂ','ㅆ':'ㅅ','ㅉ':'ㅈ'};
    return map[ch] || ch;
  }
  // 영문
  if ((code >= 65 && code <= 90) || (code >= 97 && code <= 122)) {
    return ch.toUpperCase();
  }
  // 숫자
  if (code >= 48 && code <= 57) return '#';
  return null;
}

// 키워드 정규화 (중복 제거용)
function normalizeKeyword(kw) {
  return kw.trim().replace(/^[#\s]+/, '').replace(/\s+/g, ' ').toLowerCase();
}

// 스프레드시트 데이터 파싱
async function loadData() {
  try {
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.slice(47, -2));
    const rows = json.table.rows;

    allData = [];
    const kwNormMap = {}; // normalized -> original

    rows.forEach(row => {
      if (!row.c || !row.c[4]?.v) return;
      const date = row.c[0]?.v || '';
      const channel = row.c[1]?.v || '';
      const thumb = row.c[2]?.v || '';
      const title = row.c[4]?.v || '';
      const link = row.c[5]?.v || '';
      const tags = [
        row.c[6]?.v, row.c[7]?.v, row.c[8]?.v,
        row.c[9]?.v, row.c[10]?.v, row.c[14]?.v
      ].filter(Boolean).map(t => String(t).trim())
       .filter(t => t && t.length > 1 && !t.startsWith('yt:'));

      const video = { date, channel, thumb, title, link, tags };
      allData.push(video);

      // 태그 → 키워드맵 구축
      const uniqueTags = new Set();
      tags.forEach(tag => {
        const norm = normalizeKeyword(tag);
        if (!norm || norm.length < 2) return;
        if (!kwNormMap[norm]) kwNormMap[norm] = tag;
        uniqueTags.add(norm);
      });

      uniqueTags.forEach(norm => {
        const original = kwNormMap[norm];
        if (!keywordMap[original]) keywordMap[original] = [];
        keywordMap[original].push(video);
      });
    });

    // 중복 비디오 제거
    Object.keys(keywordMap).forEach(kw => {
      const seen = new Set();
      keywordMap[kw] = keywordMap[kw].filter(v => {
        if (seen.has(v.link)) return false;
        seen.add(v.link);
        return true;
      });
    });

    // letterMap 구축
    Object.keys(keywordMap).forEach(kw => {
      const letter = getFirstLetter(kw);
      if (!letter) return;
      if (!letterMap[letter]) letterMap[letter] = [];
      letterMap[letter].push(kw);
    });

    // 각 letter 내 키워드 정렬 (빈도 높은 순)
    Object.keys(letterMap).forEach(letter => {
      letterMap[letter].sort((a, b) => keywordMap[b].length - keywordMap[a].length);
    });

    document.getElementById('total-count').textContent = `총 ${allData.length}개 컨텐츠 | 키워드 ${Object.keys(keywordMap).length}개`;
    document.getElementById('loading').style.display = 'none';
    buildIndexBar();
    buildIndexView();
    document.getElementById('index-view').style.display = 'block';

  } catch(e) {
    document.getElementById('loading').innerHTML = '❌ 데이터 로드 실패. 잠시 후 다시 시도해주세요.';
    console.error(e);
  }
}

// 색인 바 생성
function buildIndexBar() {
  const consonants = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const alphabets = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const all = [...consonants, ...alphabets, '#'];
  
  const bar = document.getElementById('index-bar');
  all.forEach(letter => {
    const btn = document.createElement('button');
    btn.className = 'index-letter' + (letterMap[letter] ? '' : ' empty');
    btn.textContent = letter;
    btn.onclick = () => {
      if (!letterMap[letter]) return;
      scrollToLetter(letter);
      document.querySelectorAll('.index-letter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
    bar.appendChild(btn);
  });
}

// 색인 뷰 생성
function buildIndexView() {
  const consonants = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const alphabets = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const all = [...consonants, ...alphabets, '#'];

  const view = document.getElementById('index-view');
  view.innerHTML = '';

  all.forEach(letter => {
    if (!letterMap[letter]) return;
    const keywords = letterMap[letter];

    const section = document.createElement('div');
    section.className = 'letter-section';
    section.id = `section-${letter}`;

    section.innerHTML = `
      <div class="letter-header">
        <div class="letter-badge">${letter}</div>
        <div>
          <div class="letter-title">${letter}</div>
          <div class="letter-count">키워드 ${keywords.length}개</div>
        </div>
      </div>
      <div class="keyword-grid">
        ${keywords.map(kw => `
          <button class="keyword-chip" onclick="showResultView('${escapeAttr(kw)}')">
            ${escapeHtml(kw)}
            <span class="chip-count">${keywordMap[kw].length}</span>
          </button>
        `).join('')}
      </div>
    `;
    view.appendChild(section);
  });
}

function scrollToLetter(letter) {
  const el = document.getElementById(`section-${letter}`);
  if (el) {
    const y = el.getBoundingClientRect().top + window.scrollY - 140;
    window.scrollTo({ top: y, behavior: 'smooth' });
  }
}

// 결과 뷰 표시
function showResultView(keyword) {
  const videos = keywordMap[keyword] || [];
  document.getElementById('index-view').style.display = 'none';
  document.getElementById('search-view').style.display = 'none';
  document.getElementById('result-view').style.display = 'block';
  document.getElementById('back-btn').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  const view = document.getElementById('result-view');
  view.innerHTML = `
    <div class="result-header">
      <div class="result-keyword">🔍 <span>"${escapeHtml(keyword)}"</span></div>
      <div class="result-meta">관련 컨텐츠 ${videos.length}개</div>
    </div>
    <div class="video-grid">
      ${videos.map(v => videoCard(v, keyword)).join('')}
    </div>
  `;
}

// 색인 뷰로 돌아가기
function showIndexView() {
  document.getElementById('index-view').style.display = 'block';
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('search-view').style.display = 'none';
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('search-input').value = '';
}

// 비디오 카드 HTML
function videoCard(v, highlightKw = '') {
  const tags = v.tags.slice(0, 4).map(t => `<span class="video-tag">${escapeHtml(t)}</span>`).join('');
  const dateStr = v.date ? String(v.date).substring(0, 10) : '';
  return `
    <a href="${escapeAttr(v.link)}" target="_blank" class="video-card">
      ${v.thumb
        ? `<img class="video-thumb" src="${escapeAttr(v.thumb)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''}
      <div class="video-thumb-placeholder" ${v.thumb ? 'style="display:none"' : ''}>🎬</div>
      <div class="video-info">
        <div class="video-title">${escapeHtml(v.title)}</div>
        <div class="video-meta">
          <div class="video-channel">${escapeHtml(v.channel)}</div>
          <div class="video-date">${dateStr}</div>
        </div>
        ${tags ? `<div class="video-tags">${tags}</div>` : ''}
      </div>
    </a>
  `;
}

// 검색
let searchTimer;
document.getElementById('search-input').addEventListener('input', function() {
  clearTimeout(searchTimer);
  const q = this.value.trim();
  if (!q) {
    showIndexView();
    return;
  }
  searchTimer = setTimeout(() => doSearch(q), 300);
});

function doSearch(q) {
  const lower = q.toLowerCase();
  document.getElementById('index-view').style.display = 'none';
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('search-view').style.display = 'block';
  document.getElementById('back-btn').style.display = 'block';

  // 매칭 키워드 찾기
  const matchedKws = Object.keys(keywordMap).filter(kw => kw.toLowerCase().includes(lower));
  
  // 매칭 비디오 (중복 제거)
  const seen = new Set();
  const videos = [];
  
  // 키워드 일치 우선
  matchedKws.forEach(kw => {
    keywordMap[kw].forEach(v => {
      if (!seen.has(v.link)) { seen.add(v.link); videos.push(v); }
    });
  });
  
  // 제목 검색
  allData.forEach(v => {
    if (!seen.has(v.link) && v.title.toLowerCase().includes(lower)) {
      seen.add(v.link); videos.push(v);
    }
  });

  const view = document.getElementById('search-view');
  if (videos.length === 0) {
    view.innerHTML = `<div class="empty-state"><div class="emoji">🔍</div><div>"${escapeHtml(q)}" 관련 결과가 없습니다</div></div>`;
  } else {
    const kwHtml = matchedKws.length > 0
      ? `<div style="margin-bottom:12px; display:flex; flex-wrap:wrap; gap:6px;">
          ${matchedKws.slice(0,10).map(kw => `<button class="keyword-chip" onclick="showResultView('${escapeAttr(kw)}')">${escapeHtml(kw)} <span class="chip-count">${keywordMap[kw].length}</span></button>`).join('')}
         </div>`
      : '';
    view.innerHTML = `
      <div class="result-header">
        <div class="result-keyword">🔍 <span>"${escapeHtml(q)}"</span></div>
        <div class="result-meta">키워드 ${matchedKws.length}개 · 컨텐츠 ${videos.length}개</div>
      </div>
      ${kwHtml}
      <div class="video-grid">${videos.map(v => videoCard(v)).join('')}</div>
    `;
  }
}

function escapeHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(s) {
  return String(s||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}

loadData();
</script>
</body>
</html>
